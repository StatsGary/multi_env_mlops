name: "[Multi-Env MLOps] Deploy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (or shared for the ML Registry)'
        required: true
        type: choice
        options:
          - shared
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

env:
  BICEP_DIR: infra
  PROJECT: readmit

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name rg-${{ env.PROJECT }}-${{ inputs.environment }} \
            --location swedencentral \
            --tags project=${{ env.PROJECT }} environment=${{ inputs.environment }} managedBy=bicep

      - name: Bicep Lint
        run: |
          if [ "${{ inputs.environment }}" = "shared" ]; then
            az bicep build --file ${{ env.BICEP_DIR }}/shared.bicep
          else
            az bicep build --file ${{ env.BICEP_DIR }}/main.bicep
          fi

      - name: What-If
        run: |
          if [ "${{ inputs.environment }}" = "shared" ]; then
            az deployment group what-if \
              --resource-group rg-${{ env.PROJECT }}-shared \
              --template-file ${{ env.BICEP_DIR }}/shared.bicep \
              --parameters ${{ env.BICEP_DIR }}/parameters/shared.bicepparam
          else
            WS_TS=$(date -u +%H%M%S)
            az deployment group what-if \
              --resource-group rg-${{ env.PROJECT }}-${{ inputs.environment }} \
              --template-file ${{ env.BICEP_DIR }}/main.bicep \
              --parameters ${{ env.BICEP_DIR }}/parameters/${{ inputs.environment }}.bicepparam \
              --parameters workspaceNameSuffix="$WS_TS" \
              --parameters keyVaultNameSuffix='${{ github.run_number }}'
          fi

  deploy:
    name: Deploy ${{ inputs.environment }}
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install ML Extension
        run: az extension add -n ml --yes

      - name: Get Registry ID
        if: inputs.environment != 'shared'
        id: registry
        run: |
          REGISTRY_ID=$(az ml registry show \
            --name ${{ env.PROJECT }}-registry \
            --resource-group rg-${{ env.PROJECT }}-shared \
            --query id -o tsv 2>/dev/null || echo "")
          echo "registry_id=$REGISTRY_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep
        id: deploy
        run: |
          if [ "${{ inputs.environment }}" = "shared" ]; then
            az deployment group create \
              --resource-group rg-${{ env.PROJECT }}-shared \
              --template-file ${{ env.BICEP_DIR }}/shared.bicep \
              --parameters ${{ env.BICEP_DIR }}/parameters/shared.bicepparam \
              --name deploy-shared-${{ github.run_number }}
          else
            # Capture the actual deployed workspace name from Bicep outputs.
            WS_TS=$(date -u +%H%M%S)
            WORKSPACE_NAME=$(az deployment group create \
              --resource-group rg-${{ env.PROJECT }}-${{ inputs.environment }} \
              --template-file ${{ env.BICEP_DIR }}/main.bicep \
              --parameters ${{ env.BICEP_DIR }}/parameters/${{ inputs.environment }}.bicepparam \
              --parameters workspaceNameSuffix="$WS_TS" \
              --parameters keyVaultNameSuffix='${{ github.run_number }}' \
              --parameters mlRegistryId='${{ steps.registry.outputs.registry_id }}' \
              --name deploy-${{ inputs.environment }}-${{ github.run_number }} \
              --query properties.outputs.workspaceName.value \
              -o tsv)
            echo "workspace_name=$WORKSPACE_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Set identity datastore auth
        if: inputs.environment != 'shared'
        run: |
          # Use the deployed name (includes suffix) instead of a hardcoded convention.
          az ml workspace update \
            --name '${{ steps.deploy.outputs.workspace_name }}' \
            --resource-group rg-${{ env.PROJECT }}-${{ inputs.environment }} \
            --system-datastores-auth-mode identity

      - name: Deploy Endpoint Subscription Roles (prod only)
        if: inputs.environment == 'prod'
        run: |
          UAMI_PRINCIPAL_ID=$(az identity show \
            --name ${{ env.PROJECT }}-endpoint-identity \
            --resource-group rg-${{ env.PROJECT }}-prod \
            --query principalId -o tsv)

          az deployment sub create \
            --location swedencentral \
            --template-file ${{ env.BICEP_DIR }}/endpoint-sub-roles.bicep \
            --parameters endpointPrincipalId="$UAMI_PRINCIPAL_ID" \
            --name endpoint-sub-roles-${{ github.run_number }}
