name: "[Multi-Env MLOps] Train"

# Registers components to the dev workspace, trains to validate them,
# then promotes working components and environment to the shared registry.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY_NAME: readmit-registry
  PROJECT: readmit
  MLOPS_DIR: mlops/azureml

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: Register components locally in Dev and train (synthetic data)
  # -----------------------------------------------------------------------
  train-dev:
    name: Train on Dev (synthetic data)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install ML Extension
        run: az extension add -n ml --yes

      - name: Resolve Dev workspace name
        run: |
          # Workspace names are environment-prefixed and include a dynamic suffix.
          # Resolve the actual Dev workspace at runtime instead of hardcoding.
          ws_name=$(az ml workspace list \
            --resource-group rg-${{ env.PROJECT }}-dev \
            --query "[?starts_with(name, '${{ env.PROJECT }}-dev-')].name | [0]" -o tsv)

          if [[ -z "$ws_name" ]]; then
            echo "::error::Could not find a dev AML workspace in rg-${{ env.PROJECT }}-dev"
            exit 1
          fi

          # Persist for later steps in this job.
          echo "DEV_WORKSPACE=$ws_name" >> "$GITHUB_ENV"
          echo "Using workspace: $ws_name"

      - name: Set defaults
        run: |
          # Use discovered workspace so all az ml commands target the correct Dev workspace.
          az configure --defaults \
            group=rg-${{ env.PROJECT }}-dev \
            workspace=${{ env.DEV_WORKSPACE }}

      - name: Ensure environment exists in Dev workspace
        run: |
          az ml environment create \
            --file ${{ env.MLOPS_DIR }}/train/train-env.yml \
            || echo "Environment version already exists in workspace"

      - name: Register Components to Dev workspace
        run: |
          for comp in prep train evaluate register; do
            az ml component create \
              --file ${{ env.MLOPS_DIR }}/components/$comp.yml \
              || echo "Component $comp version already exists"
          done

      - name: Ensure data asset exists
        run: |
          az ml data show --name readmission-raw-data --label latest \
            || { echo "::error::Data asset 'readmission-raw-data' not found. Run scripts/generate_and_upload_data.py first."; exit 1; }

      - name: Submit Pipeline
        id: pipeline
        run: |
          run_id=$(az ml job create \
            --file ${{ env.MLOPS_DIR }}/train/pipeline-dev.yml \
            --query name -o tsv)
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "Pipeline submitted: $run_id"

          status="Running"
          while [[ "$status" == "Running" || "$status" == "NotStarted" || "$status" == "Preparing" || "$status" == "Queued" || "$status" == "Starting" || "$status" == "Finalizing" ]]; do
            sleep 30
            status=$(az ml job show --name "$run_id" --query status -o tsv)
            echo "Status: $status"
          done
          if [[ "$status" != "Completed" ]]; then
            echo "::error::Pipeline failed with status: $status"
            exit 1
          fi

      - name: Check model accuracy meets threshold
        run: |
          # Find the evaluate child job run ID
          run_id="${{ steps.pipeline.outputs.run_id }}"
          eval_run_id=$(az ml job list \
            --parent-job-name "$run_id" \
            --resource-group rg-${{ env.PROJECT }}-dev \
            --workspace-name "$DEV_WORKSPACE" \
            --query "[?display_name=='evaluate_model'].name | [0]" -o tsv)

          if [[ -z "$eval_run_id" ]]; then
            echo "::error::Could not find evaluate_model child job"
            exit 1
          fi
          echo "Evaluate job run ID: $eval_run_id"

          # Get the workspace tracking URI and query MLflow REST API for metrics
          # The tracking URI uses azureml:// scheme — convert to https:// for REST calls
          TRACKING_URI=$(az ml workspace show \
            --name "$DEV_WORKSPACE" \
            --resource-group rg-${{ env.PROJECT }}-dev \
            --query "mlflow_tracking_uri" -o tsv \
            | sed 's|azureml://|https://|')

          TOKEN=$(az account get-access-token --resource https://ml.azure.com --query accessToken -o tsv)

          ACCURACY=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "${TRACKING_URI}/api/2.0/mlflow/runs/get?run_id=${eval_run_id}" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          metrics = data['run']['data']['metrics']
          acc = next((m['value'] for m in metrics if m['key'] == 'test_accuracy'), None)
          print(acc if acc is not None else '')
          ")

          if [[ -z "$ACCURACY" ]]; then
            echo "::error::Could not retrieve test_accuracy metric from evaluate job"
            exit 1
          fi

          echo "Model accuracy: $ACCURACY"
          THRESHOLD=0.10

          # Compare using awk (bash doesn't do float comparison natively)
          PASS=$(echo "$ACCURACY $THRESHOLD" | awk '{print ($1 >= $2) ? 1 : 0}')
          if [[ "$PASS" -ne 1 ]]; then
            echo "::error::Model accuracy $ACCURACY is below threshold $THRESHOLD — promotion blocked"
            exit 1
          fi
          echo "Accuracy $ACCURACY >= $THRESHOLD — model qualifies for promotion"

  # -----------------------------------------------------------------------
  # Gate: Manual approval before promoting to shared Registry
  # -----------------------------------------------------------------------
  approve-promotion:
    name: Approval Gate — Registry Promotion
    needs: train-dev
    runs-on: ubuntu-latest
    environment: registry-promotion
    steps:
      - run: echo "Registry promotion approved by reviewer."

  # -----------------------------------------------------------------------
  # Stage 2: Promote validated components to shared Registry
  # -----------------------------------------------------------------------
  promote-components:
    name: Promote Components to Registry
    needs: approve-promotion
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install ML Extension
        run: az extension add -n ml --yes

      - name: Promote Environment to Registry
        run: |
          az ml environment create \
            --file ${{ env.MLOPS_DIR }}/train/train-env.yml \
            --registry-name ${{ env.REGISTRY_NAME }} \
            || echo "Environment version already exists in registry"

      - name: Register Components to Registry
        run: |
          for comp in prep train evaluate register; do
            az ml component create \
              --file ${{ env.MLOPS_DIR }}/components/$comp.yml \
              --registry-name ${{ env.REGISTRY_NAME }} \
              || echo "Component $comp version already exists"
          done

