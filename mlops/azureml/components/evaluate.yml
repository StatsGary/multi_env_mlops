$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: readmission_evaluate
display_name: Evaluate Model
version: 1
description: Evaluate the trained model on the test set and write a deploy gate flag.

code: ../../../data_science
command: >-
  python src/evaluate.py
  --model_name ${{inputs.model_name}}
  --model_input ${{inputs.model_input}}
  --test_data ${{inputs.test_data}}
  --evaluation_output ${{outputs.evaluation_output}}

environment: azureml:readmission-train-env:1

inputs:
  model_name:
    type: string
  model_input:
    type: uri_folder
  test_data:
    type: uri_folder

outputs:
  evaluation_output:
    type: uri_folder
